    <link rel="stylesheet" href="footer-header.css">
</head>

<header>
    <div class="banner">

        <div class="container-grid">

            <nav>
                <div class="menu">
                    <a href="#historia">História</a>
                    <a href="#filmes.html">Filmes</a>

                </div>


                <div class="titulo">
                    <a href="#container-grid">Tarantino Rate</a>

                <div class="menu">
                    <a href="cadastro.html">Cadastro</a>
                    <a href="login.html">Login</a>
                </div>

            </nav>

        </div>

    </div>

</header>

<body>

    <div class="container">
        <div class="container-cadastro">
            <div class="tituloCadastro">
                <h1>Cadastre-se</h1>
            </div>
            <div class="conteudo-cadastro">
                <div class="inputsCadastro">
                    Nome completo <br><input type="text" class="nome"> <br>
                    Username <br><input type="text" class="username"> <br>
                    Email <br><input type="text" class="email"> <br>
                    Senha <br><input type="text" class="senha"> <br>
                    Confirme sua senha <br><input type="text" class="confirmeSenha"> <br>
                    <label for="filmeFavorito"></label>
                    <select name="" id="">
                        <option value="caesDeAluguel">Cães de aluguel</option>
                        <option value="pulpFiction">Pulp Fiction</option>
                        <option value="jackieBrown">Jackie Brown</option>
                        <option value="killBill1">Kill Bill - Parte 1</option>
                        <option value="killBill2">Kill Bill - Parte 2</option>
                        <option value="provaDeMorte">A prova de morte</option>
                        <option value="bastardoInglorios">Bastardos Inglórios</option>
                        <option value="djangoLivre">Django Livre</option>
                        <option value="oitoOdiados">Os oito odiados</option>
                        <option value="eraUmaVez">Era uma vez em Hollywood</option>
                        <option value="nãoAssistiu">Nenhum</option>
                    </select>
                </div>
                <div class="botaoEnviar">
                    <button>Enviar</button>
                </div>
                <div class="mensagem">
                    <a href="login.html">Já possui conta? <span>Entre</span></a>
                </div>

            </div>
        </div>

    </div>

</body>
