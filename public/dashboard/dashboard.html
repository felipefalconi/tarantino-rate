<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

    <div class="container-inicio">
        <h1>Olá, usuário bem vindo a Dashboard!</h1>

        <button class="botao-voltar" onclick="window.location.href='../filmes.html'" >Voltar</button>

    </div>

    <div class="container-kpis">

        <div class="kpi kpi-nivel-fa" style="padding: 20px;">
            <strong>Nível de fã</strong>
            <div class="container-barraProgresso">
                <div class="barraProgresso" id="barraProgresso" style="width: 60%;">
                    <span id="textoProgresso">60%</span>
                </div>
            </div>
        </div>

        <div class="kpi">
            <strong>Filme de maior nota</strong>
            <span>Bastardos Inglórios</span>
        </div>

        <div class="kpi">
            <strong>Emoção predominante</strong>
            <span>Tensão</span>
        </div>

        <div class="kpi">
            <strong>Quantidade de avaliações</strong>
            <span>50</span>
        </div>

    </div>

    <div class="container-graficos">
        <div class="grafico">
            <canvas id="graficoFichaTecnica"></canvas>
        </div>
        <div class="grafico">
            <canvas id="graficoMaiorDestaque"></canvas>
        </div>
        <div class="rankingComunidade">
            <strong>Ranking da Comunidade</strong>
        </div>
        <div class="grafico">
            <canvas id="graficoComparativoComunidade"></canvas>
        </div>
        <div class="grafico">
            <canvas id="graficoEmocoesFrequentes"></canvas>
        </div>

    </div>



</body>

</html>

<script>

    const graficoFichaTecnica = document.getElementById('graficoFichaTecnica');

    new Chart(graficoFichaTecnica, {
        type: 'radar',
        data: {
            labels: ['Sangue', 'Tensão', 'Diálogos', 'Trilha Sonora'],
            datasets: [{
                label: 'Média do Filme',
                data: [3, 5, 4, 3],
                backgroundColor: 'rgba(249, 213, 0, 0.4)',
                borderColor: '#F9D500',
                pointBackgroundColor: '#F9D500',
                pointBorderColor: '#fff',
                borderWidth: 2
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                title: {
                    display: true,
                    text: 'Ficha Técnica',
                    color: '#ffffff',
                    font: { size: 16 }
                },
                legend: {
                    labels: {
                        color: '#ffffff',
                        font: { family: 'Inter', size: 14 }
                    }
                }
            },
            scales: {
                r: {
                    min: 0,
                    max: 5,

                    angleLines: {
                        color: 'rgba(255, 255, 255, 0.1)'
                    },
                    grid: {
                        color: 'rgba(255, 255, 255, 0.2)'
                    },
                    pointLabels: {
                        color: '#e0e0e0',
                        font: { family: 'Inter', size: 13 }
                    },
                    ticks: {
                        color: '#ffffff',
                        backdropColor: 'transparent',
                        stepSize: 1
                    }
                }
            }
        }
    });

    const graficoMaiorDestaque = document.getElementById('graficoMaiorDestaque');

    new Chart(graficoMaiorDestaque, {
        type: 'doughnut',
        data: {
            labels: ['Direção', 'Roteiro', 'Atuação', 'Trilha', 'Fotografia', 'Ação'],
            datasets: [{
                data: [35, 20, 15, 10, 20, 5],
                borderWidth: 0,
                backgroundColor: ['#003466', '#E34633', '#B13529', '#000000', '#F9D500', '#2980b9'],
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                title: {
                    display: true,
                    text: 'Veredito Técnico',
                    color: '#ffffff',
                    font: { size: 16 }
                },
                legend: {
                    position: 'left',
                    labels: { color: "#ffffff" }
                }
            }
        }
    });

    const graficoComparativoComunidade = document.getElementById('graficoComparativoComunidade');

    new Chart(graficoComparativoComunidade, {
        type: 'bar',
        data: {
            labels: ['Pulp Fiction', 'Kill Bill', 'Bastardos', 'Django'],
            datasets: [
                {
                    label: 'Você',
                    data: [5, 4, 5, 3],
                    backgroundColor: '#f1c40f'
                },
                {
                    label: 'Comunidade',
                    data: [4.5, 4.2, 4.8, 4.0],
                    backgroundColor: '#000'
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                title: { display: true, text: 'Comparativo com a comunidade', color: '#fff' },
                legend: { labels: { color: '#fff' } }
            },
            scales: {
                x: { ticks: { color: "#ffffff" } },
                y: { ticks: { color: "#ffffff" }, min: 0, max: 5 }
            }
        }
    });

    const graficoEmocoesFrequentes = document.getElementById('graficoEmocoesFrequentes');

    new Chart(graficoEmocoesFrequentes, {
        type: 'pie',
        data: {
            labels: ['Tensão', 'Medo', 'Tristeza', 'Raiva', 'Alegria'],
            datasets: [{
                data: [40, 15, 10, 25, 10, 5, 20],
                backgroundColor: ['#f1c40f', '#2980b9', '#e74c3c', '#c0392b', '#27ae60', '#D9C07D', '#FFFFFF'],
                borderWidth: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                title: { display: true, text: 'Emoções mais frequentes', color: '#fff' },
                legend: { position: 'left', labels: { color: '#fff' } }
            }
        }
    });

</script>
