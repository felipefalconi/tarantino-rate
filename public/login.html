<script>
    function entrar() {
        let emailVar = ipt_email.value;
        let senhaVar = ipt_senha.value;

        if (emailVar == "" || senhaVar == "") {
            alert('Todos os campos devem ser preenchidos');
            return false;
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id; 
                    sessionStorage.USERNAME_USUARIO = json.username; 
                    sessionStorage.FILME_FAVORITO = json.filmeFavorito; 

                    alert('Login realizado! Direcionando para tela inicial!');

                    setTimeout(function () {
                        window.location = "home.html";
                    }, 1000); 

                });

            } else {
                console.log("Houve um erro ao tentar realizar o login!");
                
                resposta.text().then(texto => {
                    console.error(texto);
                    alert("Email e/ou senha inválidos. Tente novamente!"); 
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }
</script>
