<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação</title>
    <link rel="stylesheet" href="css/avaliacao.css">

</head>

<body>
    <div class="containerGeral">
        <div class="container-avaliacao">
            <div class="titulo_avaliacao">
                <h1>Avaliar</h1>

            </div>

            <div class="avaliacaoGeral_avaliacao">
                <h1>Avaliacao Geral</h1>
            </div>

            <div class="dialogoTrilha">
                <div class="dialogo_avaliacao">
                    <h1>Nivel do diálogo</h1>

                </div>
                <div class="trilha_avaliacao">
                    <h1>Nivel da trilha sonora</h1>
                </div>
            </div>

            <div class="sangueTensao">
                <div class="sangue_avaliacao">
                    <h1>Nível de sangue</h1>
                    
                </div>
                <div class="tensao_avaliacao">
                    <h1>Nivel de tensão</h1>
                </div>
            </div>

            <div class="destaqueEmocao">
                <div class="destaque_avaliacao">
                    <h1>Destaque do filme</h1>
                    <label for="destaque_avaliacao">Insira o que se destacou no filme</label> <br>
                    <select name="" id="sel_Destaquefilme">
                        <option value="11">Nenhum</option>
                        <option value="1">Cães de aluguel</option>
                        <option value="2">Pulp Fiction</option>
                        <option value="3">Jackie Brown</option>
                        <option value="4">Kill Bill - Parte 1</option>
                        <option value="5">Kill Bill - Parte 2</option>
                        <option value="6">A prova de morte</option>
                        <option value="7">Bastardos Inglórios</option>
                        <option value="8">Django Livre</option>
                        <option value="9">Os oito odiados</option>
                        <option value="10">Era uma vez em Hollywood</option>
                    </select>
                </div>
                <div class="emocao_avaliacao">
                    <h1>Emoção predominante</h1>
                    <label for="emocao_avaliacao">Filme favorito do Tarantino</label> <br>
                    <select name="" id="sel_emocaoPredominante">
                        <option value="11">Nenhum</option>
                        <option value="1">Cães de aluguel</option>
                        <option value="2">Pulp Fiction</option>
                        <option value="3">Jackie Brown</option>
                        <option value="4">Kill Bill - Parte 1</option>
                        <option value="5">Kill Bill - Parte 2</option>
                        <option value="6">A prova de morte</option>
                        <option value="7">Bastardos Inglórios</option>
                        <option value="8">Django Livre</option>
                        <option value="9">Os oito odiados</option>
                        <option value="10">Era uma vez em Hollywood</option>
                    </select>
                </div>
            </div>


        </div>
    </div>


</body>

</html>
